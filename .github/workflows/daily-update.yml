name: Daily Data Update

on:
  schedule:
    # 每天北京时间 8:17 AM (UTC 0:17)
    - cron: '17 0 * * *'
  workflow_dispatch:  # 手动执行

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-update"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data collection
        run: python collector.py

      - name: Run translation
        run: python translate_auto.py

      - name: Check for changes
        id: check
        run: |
          git add data.json archive/ 2>/dev/null
          git diff --cached --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
          git reset HEAD -- . > /dev/null 2>&1

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git add data.json archive/
          git commit -m "Daily auto-update: ${DATE}

          Automated data collection from Reddit, Quora, Threads.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      # 数据更新后部署到GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
